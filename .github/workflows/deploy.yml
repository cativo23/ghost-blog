name: Deploy

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Build theme
        run: |
          cd theme
          find . -type f ! -path '*/\.*' -print | python3 -c "import sys, zipfile; z = zipfile.ZipFile('../cativo-terminal.zip', 'w', zipfile.ZIP_DEFLATED); [z.write(line.strip()[2:]) for line in sys.stdin if line.strip()]; z.close()"
          cd ..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: theme
          path: cativo-terminal.zip

  deploy:
    name: Deploy to Production
    needs: build
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: theme

      - name: Copy compose file to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          source: "compose.prod.yml"
          target: "/home/cativo23/deploy/ghost-blog-deploy"

      - name: Copy theme to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          source: "cativo-terminal.zip"
          target: "/home/cativo23/deploy/ghost-blog-deploy"

      - name: Deploy to production
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          envs: DB_PASSWORD
          script: |
            cd /home/cativo23/deploy/ghost-blog-deploy

            # Create .env file with secrets
            cat > .env << EOF
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            SMTP_HOST=
            SMTP_PORT=
            SMTP_USER=
            SMTP_PASS=
            EOF

            # Unzip theme
            unzip -o cativo-terminal.zip -d content/themes/cativo-terminal

            # Pull and deploy
            docker compose -f compose.prod.yml pull
            docker compose -f compose.prod.yml down || true
            docker compose -f compose.prod.yml up -d

            # Wait and show logs
            sleep 10
            docker compose -f compose.prod.yml logs --tail=50

            echo "Theme deployed to production"
        env:
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
