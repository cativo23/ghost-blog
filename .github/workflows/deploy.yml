name: Deploy

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Build theme
        run: |
          cd theme
          find . -type f ! -path '*/\.*' -print | python3 -c "import sys, zipfile; z = zipfile.ZipFile('../cativo-terminal.zip', 'w', zipfile.ZIP_DEFLATED); [z.write(line.strip()[2:]) for line in sys.stdin if line.strip()]; z.close()"
          cd ..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: theme
          path: cativo-terminal.zip

  deploy:
    name: Deploy to Server
    needs: build
    runs-on: ubuntu-latest
    environment: ${{ github.event.release.prerelease && 'dev' || 'prod' }}
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: theme

      - name: Set deployment target
        id: target
        env:
          IS_PRERELEASE: ${{ github.event.release.prerelease }}
        run: |
          if [[ "$IS_PRERELEASE" == "true" ]]; then
            echo "path=/home/cativo23/ghost-blog-dev" >> "$GITHUB_OUTPUT"
            echo "env=development" >> "$GITHUB_OUTPUT"
          else
            echo "path=/home/cativo23/ghost-blog" >> "$GITHUB_OUTPUT"
            echo "env=production" >> "$GITHUB_OUTPUT"
          fi

      - name: Copy theme to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          source: "cativo-terminal.zip"
          target: ${{ steps.target.outputs.path }}

      - name: Deploy theme
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            cd ${{ steps.target.outputs.path }}
            unzip -o cativo-terminal.zip -d content/themes/cativo-terminal
            docker compose restart ghost
            echo "Theme deployed to ${{ steps.target.outputs.env }}"
