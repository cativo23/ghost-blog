name: Deploy

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Build theme
        run: |
          cd theme
          find . -type f ! -path '*/\.*' -print | python3 -c "import sys, zipfile; z = zipfile.ZipFile('../cativo-terminal.zip', 'w', zipfile.ZIP_DEFLATED); [z.write(line.strip()[2:]) for line in sys.stdin if line.strip()]; z.close()"
          cd ..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: theme
          path: cativo-terminal.zip

  deploy:
    name: Deploy to Production
    needs: build
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: theme

      - name: Copy theme to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          source: "cativo-terminal.zip"
          target: "/home/cativo23/ghost-blog"

      - name: Deploy theme
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            cd /home/cativo23/ghost-blog
            unzip -o cativo-terminal.zip -d content/themes/cativo-terminal
            docker compose restart ghost
            echo "Theme deployed to production"
